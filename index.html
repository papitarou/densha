<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発車案内アプリ</title>
<style>
  :root {
    --accent: #38b6ff;
    --bg: #0b1530;
    --bg2: #0f1d44;
    --card: #16244f;
    --text: #eaf1ff;
    --sub: #9fb3d8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, var(--bg2), var(--bg));
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
  }
  h1 { font-size: 24px; font-weight: 800; margin: 0 0 4px; }
  .sub { color: var(--sub); font-size: 14px; margin-bottom: 28px; }
  .menu {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  a.app {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: var(--text);
    background: var(--card);
    border: 1px solid rgba(120,160,255,.15);
    border-left: 6px solid var(--accent);
    border-radius: 16px;
    padding: 20px 22px;
    box-shadow: 0 2px 10px rgba(0,0,0,.35);
    transition: transform .08s ease, box-shadow .08s ease;
  }
  a.app:active { transform: translateY(2px); }
  a.app .emoji { font-size: 34px; }
  a.app .t { font-size: 19px; font-weight: 800; }
  a.app .d { font-size: 13px; color: var(--sub); margin-top: 2px; }
  a.app .go { margin-left: auto; color: var(--accent); font-size: 22px; font-weight: 800; }
  footer { margin-top: 32px; font-size: 11px; color: var(--sub); text-align: center; }
</style>
</head>
<body>
  <h1>🚃 発車案内</h1>
  <div class="sub">使いたい路線をえらんでね</div>

  <div class="menu">
    <a class="app" href="sotetsu.html">
      <span class="emoji">🚆</span>
      <span>
        <div class="t">西横浜 → 横浜</div>
        <div class="d">相鉄本線・横浜方面</div>
      </span>
      <span class="go">›</span>
    </a>
    <a class="app" href="tokyo.html">
      <span class="emoji">🚄</span>
      <span>
        <div class="t">東京 → 新川崎</div>
        <div class="d">JR横須賀線・新川崎方面</div>
      </span>
      <span class="go">›</span>
    </a>
    <a class="app" href="shinkawa.html">
      <span class="emoji">🚉</span>
      <span>
        <div class="t">新川崎 → 横浜</div>
        <div class="d">横須賀線＋湘南新宿ライン</div>
      </span>
      <span class="go">›</span>
    </a>
    <a class="app" href="yoko-shinkawa.html">
      <span class="emoji">🚇</span>
      <span>
        <div class="t">横浜 → 新川崎</div>
        <div class="d">横須賀線＋湘南新宿ライン</div>
      </span>
      <span class="go">›</span>
    </a>
  </div>

  <footer>直近3本の発車時刻と「あと何分」がわかります</footer>
</body>
</html>
