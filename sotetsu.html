<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西横浜 → 横浜 発車案内</title>
<style>
  :root {
    --line: #2b6cff;      /* 相鉄ブルー */
    --accent: #38b6ff;
    --bg: #0b1530;
    --bg2: #0f1d44;
    --card: #16244f;
    --card-first: #1c3a78;
    --text: #eaf1ff;
    --sub: #9fb3d8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, var(--bg2), var(--bg));
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }
  header { text-align: center; margin-bottom: 18px; }
  .line-badge {
    display: inline-block;
    background: var(--line);
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: .1em;
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  h1 { margin: 0; font-size: 22px; font-weight: 800; }
  h1 .arrow { color: var(--accent); margin: 0 6px; }
  .now { margin-top: 6px; font-size: 14px; color: var(--sub); }
  .daytype-toggle {
    margin: 4px 0 18px;
    display: flex;
    gap: 6px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(120,160,255,.18);
    border-radius: 999px;
    padding: 4px;
  }
  .daytype-toggle button {
    border: none;
    background: transparent;
    color: var(--sub);
    font-size: 13px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 999px;
    cursor: pointer;
  }
  .daytype-toggle button.active {
    background: var(--line);
    color: #fff;
    box-shadow: 0 2px 8px rgba(43,108,255,.5);
  }
  .main-btn {
    width: 100%;
    max-width: 420px;
    border: none;
    background: linear-gradient(135deg, #2b6cff, #38b6ff);
    color: #fff;
    font-size: 20px;
    font-weight: 800;
    padding: 20px;
    border-radius: 16px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(56,182,255,.45);
    transition: transform .08s ease, box-shadow .08s ease;
  }
  .main-btn:active {
    transform: translateY(2px);
    box-shadow: 0 3px 10px rgba(56,182,255,.45);
  }
  #results {
    width: 100%;
    max-width: 420px;
    margin-top: 22px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 10px rgba(0,0,0,.35);
    border: 1px solid rgba(120,160,255,.12);
    border-left: 6px solid #3a5390;
  }
  .card.first {
    border-left-color: var(--accent);
    background: var(--card-first);
    box-shadow: 0 0 18px rgba(56,182,255,.35);
  }
  .card .left { display: flex; flex-direction: column; gap: 3px; }
  .card .rank { font-size: 12px; color: var(--sub); font-weight: 700; }
  .card .time { font-size: 30px; font-weight: 800; line-height: 1; letter-spacing: .02em; }
  .card .kind { font-size: 12px; color: var(--sub); }
  .card .right { text-align: right; }
  .card .mins { font-size: 14px; color: var(--sub); }
  .card .mins b {
    font-size: 34px;
    color: var(--accent);
    font-weight: 800;
    margin: 0 2px;
    text-shadow: 0 0 12px rgba(56,182,255,.55);
  }
  .card.soon .mins b {
    color: #ffd23f;
    text-shadow: 0 0 14px rgba(255,210,63,.6);
  }
  .empty {
    text-align: center;
    color: var(--sub);
    padding: 24px;
    font-size: 15px;
    line-height: 1.7;
  }
  footer {
    margin-top: 26px;
    font-size: 11px;
    color: var(--sub);
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <header>
    <div class="line-badge">相鉄本線</div>
    <h1>西横浜 <span class="arrow">→</span> 横浜方面</h1>
    <div class="now" id="now">--:--</div>
  </header>

  <div class="daytype-toggle" id="toggle">
    <button data-type="weekday">平日</button>
    <button data-type="holiday">土休日</button>
  </div>

  <button class="main-btn" id="checkBtn">🚃 直近の電車をしらべる</button>

  <div id="results"></div>

  <footer>
    出典：相鉄グループ公式時刻表（2026年6月時点）<br>
    西横浜→横浜方面はすべて各停です。<br>
    ※祝日は「土休日」を選んでね。
  </footer>

<script>
// ===== 時刻表データ（西横浜 → 横浜方面 / 各停）=====
// 出典: 相鉄グループ公式（2026年6月）
const TIMETABLE = {
  weekday: {
    5: [12,23,42,59],
    6: [6,19,33,45,51,59],
    7: [5,14,23,31,38,45,53],
    8: [0,8,15,23,30,37,45,52],
    9: [4,14,25,31,42,53],
    10:[3,13,26,37,47,57],
    11:[8,17,27,38,47,57],
    12:[8,17,27,38,47,57],
    13:[8,17,27,38,47,57],
    14:[8,17,27,38,47,57],
    15:[8,17,27,38,47,58],
    16:[8,18,27,37,45,57],
    17:[10,18,29,38,47,57],
    18:[6,17,23,31,38,47,59],
    19:[10,21,31,42,46,55],
    20:[3,14,24,35,48,55],
    21:[3,15,24,37,41,52],
    22:[2,15,30,45,55],
    23:[5,12,27,35,42,54],
    0: [5,15]
  },
  holiday: {
    5: [12,23,42],
    6: [1,19,31,46,59],
    7: [9,19,28,37,47,57],
    8: [7,17,27,37,47,57],
    9: [7,17,27,37,47,57],
    10:[7,17,27,37,47,57],
    11:[8,17,27,38,47,57],
    12:[8,17,27,38,47,57],
    13:[8,17,27,38,47,57],
    14:[8,17,27,38,47,57],
    15:[8,17,27,38,47,57],
    16:[7,17,27,37,47,57],
    17:[7,17,27,37,47,57],
    18:[7,17,27,37,47,57],
    19:[7,17,27,37,47,57],
    20:[7,17,27,37,47,57],
    21:[7,17,27,35,47,57],
    22:[9,23,29,43,56],
    23:[6,17,28,39,53],
    0: [3,15]
  }
};

let currentType = null;

function buildList(type) {
  const tt = TIMETABLE[type];
  const list = [];
  for (const h in tt) {
    const hour = parseInt(h, 10);
    const baseMin = (hour === 0 ? 24 : hour) * 60;
    for (const m of tt[h]) {
      list.push({ totalMin: baseMin + m, hour: hour, min: m });
    }
  }
  list.sort((a, b) => a.totalMin - b.totalMin);
  return list;
}

function autoType() {
  const d = new Date().getDay();
  return (d === 0 || d === 6) ? 'holiday' : 'weekday';
}

function setType(type) {
  currentType = type;
  document.querySelectorAll('#toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.type === type);
  });
}

function pad(n) { return String(n).padStart(2, '0'); }

function updateNow() {
  const now = new Date();
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('now').textContent =
    `${now.getMonth()+1}/${now.getDate()}(${days[now.getDay()]}) ${pad(now.getHours())}:${pad(now.getMinutes())} 現在`;
}

function check() {
  updateNow();
  const now = new Date();
  let nowMin = now.getHours() * 60 + now.getMinutes() + now.getSeconds()/60;
  if (now.getHours() < 2) nowMin += 24 * 60;

  const list = buildList(currentType);
  const upcoming = list.filter(t => t.totalMin > nowMin).slice(0, 3);

  const results = document.getElementById('results');
  results.innerHTML = '';

  if (upcoming.length === 0) {
    results.innerHTML = '<div class="empty">この時間の電車はもうありません🌙<br>始発をお待ちください。</div>';
    return;
  }

  const ranks = ['つぎの電車', '2本目', '3本目'];
  upcoming.forEach((t, i) => {
    const diff = Math.max(0, Math.ceil(t.totalMin - nowMin));
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' first' : '') + (diff <= 3 ? ' soon' : '');
    card.innerHTML = `
      <div class="left">
        <div class="rank">${ranks[i]}</div>
        <div class="time">${pad(t.hour)}:${pad(t.min)}</div>
        <div class="kind">各停 横浜ゆき</div>
      </div>
      <div class="right">
        <div class="mins">あと <b>${diff}</b> 分</div>
      </div>`;
    results.appendChild(card);
  });
}

// ===== 初期化 =====
setType(autoType());
updateNow();
setInterval(updateNow, 1000 * 20);

document.getElementById('checkBtn').addEventListener('click', check);
document.querySelectorAll('#toggle button').forEach(b => {
  b.addEventListener('click', () => { setType(b.dataset.type); check(); });
});
</script>
</body>
</html>
